services:
  db:
    image: postgres:15-alpine
    container_name: rec_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-recommender_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-recommender_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rec_qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: rec_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"

  api:
    build: .
    container_name: rec_api
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://admin:change_me_local_password@db:5432/recommender_db}
      - PORT=8000
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me_local_password}
      - POSTGRES_DB=${POSTGRES_DB:-recommender_db}
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_URL=${QDRANT_URL:-}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_HTTPS=${QDRANT_HTTPS:-false}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-products}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - SBERT_MODEL=${SBERT_MODEL:-all-MiniLM-L6-v2}
      - INGEST_SAMPLE_SIZE=${INGEST_SAMPLE_SIZE:-25000}
      - INGEST_BATCH_SIZE=${INGEST_BATCH_SIZE:-128}
      - CACHE_TTL=${CACHE_TTL:-120}
      - RANKER_MODEL_PATH=${RANKER_MODEL_PATH:-}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - USE_LLM_RERANKING=${USE_LLM_RERANKING:-false}
    volumes:
      - ./data/amz_uk_processed_data.csv:/app/data/amz_uk_processed_data.csv:ro
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: sync
          path: ./scripts
          target: /app/scripts
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./requirements.txt
        - action: rebuild
          path: ./Dockerfile

  frontend:
    image: node:20-alpine
    container_name: rec_frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-/api/v1}
      - VITE_PROXY_API=${VITE_PROXY_API:-http://api:8000}
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5173}"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    volumes:
      - ./frontend-react:/app

volumes:
  postgres_data:
  qdrant_data:
