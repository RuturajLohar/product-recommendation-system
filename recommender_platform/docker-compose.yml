version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: rec_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: recommender_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rec_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: rec_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: rec_api
    depends_on:
      - db
      - qdrant
      - redis
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secretpassword@db:5432/recommender_db
      - QDRANT_HOST=qdrant
      - REDIS_HOST=redis
    volumes:
      - .:/app

volumes:
  postgres_data:
  qdrant_data:
